stages:
  - test

test:
  stage: test
  image: python:3.11

  services:
    - name: mysql:8.0
      alias: mysql

  variables:
    # Twoje repo łączy się bez hasła, więc w CI pozwalamy na empty password
    MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    MYSQL_DATABASE: "store"

    # Env używane przez ProductRepo()
    DB_HOST: "mysql"
    DB_USER: "root"
    DB_NAME: "store"

    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"

  cache:
    paths:
      - .cache/pip

  before_script:
    - python -V
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt
    - apt-get update && apt-get install -y default-mysql-client
    # czekamy aż mysql wstanie
    - |
      for i in $(seq 1 30); do
        mysqladmin ping -h mysql && break
        sleep 2
      done

  script:
    # uruchamiamy unit + integration + coverage
    - pytest tests/unit tests/integration --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:htmlcov

  artifacts:
    when: always
    paths:
      - coverage.xml
      - htmlcov/
    expire_in: 7 days

    # GitLab pokaże raport coverage w UI (Cobertura)
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml